name: Issue Label Comment Bot

on:
  issues:
    types: [labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on labeled issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const label = context.payload.label.name;
            
            let comment = '';
            if (label === 'completed') {
              comment = 'This issue has been resolved. Thank you for your contribution!';
            } else if (label === 'feature') {
              comment = 'Thank you for the feature request. We will consider including this in a future release.';
            }
            
            if (comment) {
              github.rest.issues.createComment({
                owner: issue.owner.login,
                repo: issue.repo,
                issue_number: issue.number,
                body: comment
              });
            }
